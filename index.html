<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        if (msg.includes('Script error')) {
           return true; // suppress
        }
        return false;
      };
      window.addEventListener('error', function(e) {
        if (e.message && e.message.includes('Script error')) {
            e.preventDefault();
        }
      });
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>اتوماسیون دفتر وکالت</title>
    <!-- PWA / Mobile App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Use local system fonts to avoid VPN dependency for fonts -->
    <style>
      body {
        font-family: 'Vazirmatn', 'Tahoma', 'Arial', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800 antialiased selection:bg-amber-100 selection:text-amber-900">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        function registerSW() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) {
              console.log('Service Worker registered successfully inside HTML:', reg.scope);
              reg.update();
              
              // Register Periodic Background Sync to wake up and check alarms in background
              if ('periodicSync' in reg) {
                // Request registration of periodic background sync with minimum 1-minute interval
                reg.periodicSync.register('check-alarms', {
                  minInterval: 60 * 1000
                }).then(function() {
                  console.log('Periodic Background Sync registered for check-alarms');
                }).catch(function(err) {
                  console.warn('Periodic Sync registration failed (expected when not installed as PWA):', err);
                });
              }
            })
            .catch(function(err) {
              console.error('Service Worker registration failed inside HTML:', err);
            });
        }
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
          registerSW();
        } else {
          window.addEventListener('load', registerSW);
        }
      }
    </script>
  </body>
</html>
