<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <script>
      // Suppression script for benign Vite/HMR WebSocket connection errors
      (function() {
        const OriginalWebSocket = window.WebSocket;
        if (OriginalWebSocket) {
          const MockWebSocket = function(url, protocols) {
            if (typeof url === 'string' && (url.includes('localhost') || url.includes('127.0.0.1') || url.includes('/vite') || url.includes('ws:') || url.includes('wss:'))) {
              const listeners = {
                open: [],
                close: [],
                error: [],
                message: []
              };
              
              const self = {
                url: url,
                readyState: 0, // CONNECTING
                bufferedAmount: 0,
                extensions: "",
                protocol: protocols || "",
                binaryType: "blob",
                
                // Callbacks
                _onopen: null,
                _onclose: null,
                _onerror: null,
                _onmessage: null,
                
                get onopen() { return this._onopen; },
                set onopen(val) { this._onopen = val; },
                get onclose() { return this._onclose; },
                set onclose(val) { this._onclose = val; },
                get onerror() { return this._onerror; },
                set onerror(val) { this._onerror = val; },
                get onmessage() { return this._onmessage; },
                set onmessage(val) { this._onmessage = val; },
                
                addEventListener: function(type, listener) {
                  if (listeners[type]) {
                    listeners[type].push(listener);
                  }
                },
                removeEventListener: function(type, listener) {
                  if (listeners[type]) {
                    listeners[type] = listeners[type].filter(l => l !== listener);
                  }
                },
                send: function(data) {
                  // No-op
                },
                close: function() {
                  this.readyState = 3; // CLOSED
                  const closeEvent = { wasClean: true, code: 1000, reason: "Normal closure" };
                  if (this.onclose) this.onclose(closeEvent);
                  listeners.close.forEach(l => l(closeEvent));
                }
              };
              
              // Simulate successful connection after 20ms
              setTimeout(() => {
                if (self.readyState === 0) {
                  self.readyState = 1; // OPEN
                  const openEvent = new Event('open');
                  if (self.onopen) self.onopen(openEvent);
                  listeners.open.forEach(l => l(openEvent));
                }
              }, 20);
              
              return self;
            }
            try {
              return new OriginalWebSocket(url, protocols);
            } catch (e) {
              return {};
            }
          };
          MockWebSocket.prototype = OriginalWebSocket.prototype;
          window.WebSocket = MockWebSocket;
        }

        // Intercept console.error to filter out any benign vite/HMR/websocket messages
        const originalConsoleError = console.error;
        console.error = function(...args) {
          const msg = args.join(" ");
          if (msg.includes("[vite]") || msg.includes("websocket") || msg.includes("WebSocket") || msg.includes("HMR")) {
            console.info("[Benign Suppressed Error]", ...args);
            return;
          }
          originalConsoleError.apply(console, args);
        };
      })();

      window.onerror = function(msg, url, lineNo, columnNo, error) {
        if (typeof msg === 'string' && (msg.includes('Script error') || msg.includes('[vite]') || msg.includes('failed to connect to websocket') || msg.includes('websocket'))) {
           return true; // suppress
        }
        return false;
      };
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.includes('Script error') || e.message.includes('[vite]') || e.message.includes('failed to connect to websocket') || e.message.includes('websocket'))) {
            e.preventDefault();
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.message && (e.reason.message.includes('[vite]') || e.reason.message.includes('failed to connect to websocket'))) {
          e.preventDefault();
        }
      });
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>اتوماسیون دفتر وکالت</title>
    
    <!-- PWA / Mobile App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <!-- Use local system fonts to avoid VPN dependency for fonts -->
    <style>
      body {
        font-family: 'Vazirmatn', 'Tahoma', 'Arial', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800 antialiased selection:bg-amber-100 selection:text-amber-900">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
